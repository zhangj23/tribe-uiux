services:
  app:
    build: .
    ports:
      - "9100:9100"
    env_file:
      - path: .env
        required: false
    environment:
      - TRIBE_MOCK_MODE=true
    volumes:
      - uploads:/app/data/uploads
      - ./backend/app:/app/app
    restart: unless-stopped

  frontend:
    build: ./frontend-next
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://app:9100
    volumes:
      - ./frontend-next/src:/app/src
    depends_on:
      - app
    restart: unless-stopped

volumes:
  uploads:
